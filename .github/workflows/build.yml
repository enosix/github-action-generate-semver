name: Build and Tag
on:
  pull_request:
    paths-ignore:
      - dist/**
  push:
    branches:
      - main
    paths-ignore:
      - dist/**
  workflow_dispatch:
    inputs:
      bump:
        description: 'The type of semantic version increment to make'
        required: true
        default: 'patch'
        type: choice
        options:
          - major
          - minor
          - patch
          - none
      dry_run:
        description: 'If true, only calculate the new version and exit successfully.'
        required: false
        default: false

env:
  bump: ${{ github.event_name == 'pull_request' && 'none' || github.event_name == 'workflow_dispatch' && github.event.inputs.bump || 'patch' }}
  prerelease_version: ${{ github.event_name == 'pull_request' && format('pr{0}', github.event.number) || '' }}
  dry_run: ${{ github.event_name == 'pull_request' && 'true' || github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run || 'false' }}

jobs:
  build:
    runs-on: ubuntu-latest
    container: node:26
    steps:
      - name: Checkout
        uses: actions/checkout@12cd2235efa0937479335606d7c3ac9f6c0973b1 # v7
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref }}
          fetch-depth: 0
          token: ${{ secrets.ACCESS_TOKEN_GITHUB }}

      - name: npm install
        run: npm install
      
      - name: npm run build
        run: npm run build
      
      - name: npm run test
        run: npm run test
      
      - name: Commit and Push
        id: commit
        run: |
          git config --global user.email ${GITHUB_ACTOR}@users.noreply.github.com
          git config --global user.name "github-actions[bot]"
          git config --global --add safe.directory /__w/github-action-generate-semver/github-action-generate-semver
          
          if [ -z "$(git status --porcelain)" ]; then
            echo "changed=0">> $GITHUB_OUTPUT
            echo "No changes"
            exit 0
          fi
          
          echo "changed=1">> $GITHUB_OUTPUT
          git add -A
          git commit -m "Build Release"
          git push

      - uses: ./
        with:
          github_token: ${{ secrets.ACCESS_TOKEN_GITHUB }}
          bump: ${{ env.bump }}
          prerelease_version: ${{ env.prerelease_version }}
          dry_run: ${{ env.dry_run }}
          detect_bump: true
